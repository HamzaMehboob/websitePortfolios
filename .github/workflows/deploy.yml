name: Deploy

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-hub:
    name: Deploy Hub
    if: ${{ vars.VERCEL_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_HUB }}
          working-directory: apps/hub
          vercel-args: '--prod'

  deploy-pulse:
    name: Deploy Pulse SaaS
    if: ${{ vars.VERCEL_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PULSE }}
          working-directory: apps/saas-dashboard
          vercel-args: '--prod'

  deploy-agency:
    name: Deploy Atelier North
    if: ${{ vars.VERCEL_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_AGENCY }}
          working-directory: apps/agency
          vercel-args: '--prod'

  deploy-forma:
    name: Deploy Forma Shop
    if: ${{ vars.VERCEL_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ECOMMERCE }}
          working-directory: apps/ecommerce
          vercel-args: '--prod'

  deploy-surface:
    name: Deploy Surface
    if: ${{ vars.VERCEL_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_SURFACE }}
          working-directory: apps/editorial
          vercel-args: '--prod'

  build-github-pages:
    name: Build GitHub Pages (hub + all demos)
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build and assemble site
        env:
          GITHUB_PAGES_REPO: ${{ github.event.repository.name }}
          GITHUB_PAGES_ORIGIN: https://${{ github.repository_owner }}.github.io
          HUB_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: bash scripts/build-github-pages.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages-dist

  deploy-github-pages:
    name: Deploy GitHub Pages
    needs: build-github-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
