name: Deploy

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-hub:
    name: Deploy Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_HUB }}
          working-directory: apps/hub
          vercel-args: '--prod'

  deploy-pulse:
    name: Deploy Pulse SaaS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PULSE }}
          working-directory: apps/saas-dashboard
          vercel-args: '--prod'

  deploy-agency:
    name: Deploy Atelier North
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_AGENCY }}
          working-directory: apps/agency
          vercel-args: '--prod'

  deploy-forma:
    name: Deploy Forma Shop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ECOMMERCE }}
          working-directory: apps/ecommerce
          vercel-args: '--prod'

  deploy-surface:
    name: Deploy Surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_SURFACE }}
          working-directory: apps/editorial
          vercel-args: '--prod'

  deploy-habit:
    name: Deploy Habit (GitHub Pages)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter web
        working-directory: apps/flutter-habit
        env:
          HUB_URL: ${{ vars.HUB_URL }}
          HABIT_BASE_HREF: /${{ github.event.repository.name }}/
        run: |
          flutter pub get
          flutter build web --release \
            --base-href "${HABIT_BASE_HREF}" \
            --dart-define=HUB_URL="${HUB_URL:-https://example.com}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/flutter-habit/build/web

      - id: deployment
        uses: actions/deploy-pages@v4
