name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-js:
    name: Build JS apps
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Build editorial (isolated)
        working-directory: apps/editorial
        run: pnpm exec astro build

      - name: Build remaining portfolio apps
        run: pnpm turbo build --filter=hub --filter=saas-dashboard --filter=agency --filter=ecommerce --concurrency=2

  build-flutter:
    name: Build Flutter web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Scaffold and build Habit web
        working-directory: apps/flutter-habit
        env:
          HUB_URL: https://example.com
        run: |
          flutter create . --platforms=web --project-name habit
          flutter pub get
          flutter build web --release --no-tree-shake-icons --no-wasm-dry-run \
            --base-href "/WebsitePortfolios/habit/" \
            --dart-define=HUB_URL="${HUB_URL}"

  build-github-pages:
    name: Verify GitHub Pages bundle
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build GitHub Pages artifact
        env:
          GITHUB_PAGES_REPO: WebsitePortfolios
          GITHUB_PAGES_ORIGIN: https://example.github.io
          HUB_URL: https://example.github.io/WebsitePortfolios/
        run: bash scripts/build-github-pages.sh

      - name: Assert hub and demo paths exist
        run: |
          test -f github-pages-dist/index.html
          test -f github-pages-dist/stars.js
          test -f github-pages-dist/demos/hub.svg
          test -f github-pages-dist/demos/pulse.svg
          test -f github-pages-dist/hub/index.html
          test -f github-pages-dist/pulse/index.html
          test -f github-pages-dist/agency/index.html
          test -f github-pages-dist/agency/projects/northlight.svg
          test -f github-pages-dist/forma/shop/index.html
          test -f github-pages-dist/habit/index.html
          test -f github-pages-dist/surface/index.html
