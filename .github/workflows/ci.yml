name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-js:
    name: Build JS apps
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Build editorial (isolated)
        run: pnpm --filter editorial build

      - name: Build remaining portfolio apps
        run: pnpm turbo build --filter=hub --filter=saas-dashboard --filter=agency --filter=ecommerce --concurrency=2

  build-flutter:
    name: Build Flutter web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.29.3'
          cache: true

      - name: Scaffold Flutter web platform files
        working-directory: apps/flutter-habit
        run: flutter create . --platforms=web --project-name habit

      - name: Build Habit web
        working-directory: apps/flutter-habit
        run: |
          flutter pub get
          flutter build web --release --dart-define=HUB_URL=https://example.com
